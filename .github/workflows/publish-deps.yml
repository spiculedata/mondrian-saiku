name: publish-vendored-deps

# One-shot publisher for the vendored eigenbase / foodmart-fixture Maven
# artifacts in lib/repo/. These have no upstream source repo we control, so
# the JARs + POMs are committed under lib/repo/ for self-contained CI of
# mondrian-saiku itself. Publishing them here lets downstream consumers
# (saiku, etc.) resolve mondrian's transitive eigenbase deps without
# vendoring lib/repo themselves.
#
# olap4j and olap4j-xmlaserver are NOT published here — they have their own
# source repos (spiculedata/olap4j, spiculedata/olap4j-xmlaserver) with their
# own publish workflows.
#
# Versions are stable — re-running this workflow against an already-published
# coordinate WILL fail (GH Packages disallows release-version overwrites).
# Bump the version of a vendored artifact only if its content actually changes.

on:
  workflow_dispatch:

concurrency:
  group: publish-deps
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Deploy vendored deps to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish jar artifacts
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: https://maven.pkg.github.com/spiculedata/mondrian-saiku
        run: |
          set -euo pipefail
          # group artifact version (path under lib/repo is groupPath/artifact/version/)
          while read -r G A V; do
            [ -z "$G" ] && continue
            GPATH="${G//./\/}"
            BASE="lib/repo/$GPATH/$A/$V/$A-$V"
            echo "::group::Deploying $G:$A:$V"
            mvn -B -ntp deploy:deploy-file \
              -DgroupId="$G" \
              -DartifactId="$A" \
              -Dversion="$V" \
              -Dpackaging=jar \
              -Dfile="$BASE.jar" \
              -DpomFile="$BASE.pom" \
              -DrepositoryId=github \
              -Durl="$REPO_URL"
            echo "::endgroup::"
          done <<EOF
          eigenbase eigenbase-xom 1.3.1
          eigenbase eigenbase-resgen 1.3.1
          eigenbase eigenbase-properties 1.1.2
          mondrian-data-foodmart-hsql mondrian-data-foodmart-hsql 0.1
          EOF

