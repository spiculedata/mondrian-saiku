name: publish-vendored-deps

# One-shot publisher for the vendored Maven artifacts in lib/repo/.
# These are not Spicule-built so they don't have their own source repo; the
# JARs + POMs are committed under lib/repo/ for self-contained CI of
# mondrian-saiku itself. Publishing them to GitHub Packages here lets
# downstream consumers (saiku, etc.) resolve mondrian's transitive deps
# without vendoring lib/repo themselves.
#
# Versions are stable — re-running this workflow against an already-published
# coordinate WILL fail (GH Packages disallows release-version overwrites).
# Bump the version of a vendored artifact only if its content actually changes.

on:
  workflow_dispatch:

concurrency:
  group: publish-deps
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Deploy vendored deps to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish jar artifacts
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: https://maven.pkg.github.com/spiculedata/mondrian-saiku
        run: |
          set -euo pipefail
          # group artifact version (path under lib/repo is groupPath/artifact/version/)
          while read -r G A V; do
            [ -z "$G" ] && continue
            GPATH="${G//./\/}"
            BASE="lib/repo/$GPATH/$A/$V/$A-$V"
            echo "::group::Deploying $G:$A:$V"
            mvn -B -ntp deploy:deploy-file \
              -DgroupId="$G" \
              -DartifactId="$A" \
              -Dversion="$V" \
              -Dpackaging=jar \
              -Dfile="$BASE.jar" \
              -DpomFile="$BASE.pom" \
              -DrepositoryId=github \
              -Durl="$REPO_URL"
            echo "::endgroup::"
          done <<EOF
          eigenbase eigenbase-xom 1.3.1
          eigenbase eigenbase-resgen 1.3.1
          eigenbase eigenbase-properties 1.1.2
          org.olap4j olap4j 1.2.0-spicule-1
          org.olap4j olap4j-xmla 1.2.0-spicule-1
          org.olap4j olap4j-xmlaserver 1.3.0-spicule-jakarta
          mondrian-data-foodmart-hsql mondrian-data-foodmart-hsql 0.1
          EOF

      - name: Publish pom-only artifacts (parent POMs)
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: https://maven.pkg.github.com/spiculedata/mondrian-saiku
        run: |
          set -euo pipefail
          while read -r G A V; do
            [ -z "$G" ] && continue
            GPATH="${G//./\/}"
            POM="lib/repo/$GPATH/$A/$V/$A-$V.pom"
            echo "::group::Deploying $G:$A:$V (pom-only)"
            mvn -B -ntp deploy:deploy-file \
              -DgroupId="$G" \
              -DartifactId="$A" \
              -Dversion="$V" \
              -Dpackaging=pom \
              -Dfile="$POM" \
              -DrepositoryId=github \
              -Durl="$REPO_URL"
            echo "::endgroup::"
          done <<EOF
          org.olap4j olap4j-parent 1.2.0-spicule-1
          EOF
