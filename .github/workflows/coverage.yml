name: coverage

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

# JaCoCo coverage baseline. Runs the default surefire test suite —
# which already has `testFailureIgnore=true` so a flaky test doesn't
# kill the coverage upload — generates the HTML + XML report via the
# jacoco-maven-plugin, and uploads both as a workflow artefact.
#
# Per #23: baseline-only. No coverage threshold gate. Once we have a
# few PRs of data we can pick per-package thresholds for the
# well-tested areas (mondrian.calcite.*, mondrian.schema.yaml.*).
#
# Runs as its own workflow so failure here never blocks a PR — the
# cross-backend-equivalence harness remains the merge gate.

jobs:
  jacoco:
    name: JaCoCo coverage baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - name: Run default test suite with JaCoCo agent
        run: |
          mvn -B -ntp test
      - name: Upload JaCoCo report (HTML + XML + CSV)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          if-no-files-found: warn
          retention-days: 30
      - name: Upload jacoco.exec on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-exec
          path: target/jacoco.exec
          if-no-files-found: warn
          retention-days: 14
