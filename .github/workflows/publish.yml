name: publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional Maven version override (must end in -SNAPSHOT to be re-publishable on GitHub Packages)"
        required: false

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Deploy mondrian-saiku to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          # Generates ~/.m2/settings.xml binding <id>github</id> to GITHUB_TOKEN
          # so the <distributionManagement> entry in pom.xml authenticates correctly.
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Apply version override (dispatch only)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: mvn -B -ntp versions:set -DnewVersion="${{ inputs.version }}" -DgenerateBackupPoms=false

      - name: Deploy to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # -Dmaven.test.skip=true (not just -DskipTests) avoids resolving
        # test-scope deps like the unpublished mondrian-data-foodmart-hsql:0.1 fixture.
        run: mvn -B -ntp -Dmaven.test.skip=true deploy

      - name: Upload built JARs as workflow artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mondrian-saiku-jars
          path: target/mondrian-*.jar
          retention-days: 14
          if-no-files-found: error
